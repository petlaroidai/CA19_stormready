<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>

                    "tertiary-container": "#6b3382",
                    "surface-container": "#eceeef",
                    "on-tertiary-container": "#e5a4fc",
                    "tertiary-fixed": "#f8d8ff",
                    "on-primary-fixed-variant": "#154b6d",
                    "inverse-primary": "#9dcbf4",
                    "surface": "#f8fafb",

                    "secondary-fixed-dim": "#92ccff",
                    "primary": "#003857",
                    "inverse-on-surface": "#eff1f2",
                    "outline": "#72787f",
                    "secondary-container": "#71c0fe",
                    "inverse-surface": "#2e3132",
                    "surface-bright": "#f8fafb",
                    "outline-variant": "#c1c7cf",
                    "surface-tint": "#326286",
                    "surface-container-highest": "#e1e3e4",
                    "surface-variant": "#e1e3e4",
                    "on-surface": "#191c1d",
                    "on-primary": "#ffffff",
                    "tertiary-fixed-dim": "#ecb2ff",
                    "primary-fixed": "#cce5ff",
                    "surface-container-low": "#f2f4f5",
                    "on-secondary-container": "#004d77",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#d8dadb",
                    "on-surface-variant": "#41474e",
                    "on-error": "#ffffff",
                    "on-secondary-fixed": "#001d31",
                    "on-primary-fixed": "#001e31",
                    "on-background": "#191c1d",

                    "on-secondary-fixed-variant": "#004b73",
                    "secondary-fixed": "#cce5ff",
                    "background": "#f8fafb",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "tertiary": "#521a69",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#92c0e9",
                    "primary-container": "#1b4f72",
                    "secondary": "#006397",
                    "on-tertiary-fixed-variant": "#662e7d"

            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"

            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c1c7cf;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen">
<!-- Top Navigation Anchor (From JSON) -->
<header class="bg-[#f8fafb] dark:bg-[#1A1A2E] sticky top-0 z-[60] flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
<img alt="User" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional male user in a clean corporate environment with soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6Yw5x1CZCkmwrEv85UoD9eufSfsovpwapnqTzaFX-iWZhVQ4_24XLOJW0YxLVeC5orSUDeYdAUGBwKp2Z4vxS15pGCBjF0UcwqX24rRtNzaZNFhQeHq-fKyBjKFlMYDn06b2eW4lBJT5CBMHKzg5z7W0fKl_TEWKSdkgijQMAh2ytEK50qOELO9SuAxHm60QlI8MfZz0L3Vcfm4Yib1KHMh21TZm8pF3_blot0v4MlF4PHs-mtkYlsziXttVShuxxvS5JGIUICA"/>
</div>
<span class="text-xl font-black text-[#003857] dark:text-[#71c0fe] tracking-tighter">StormReady CA19</span>
</div>
<div class="flex items-center gap-4">
<span class="font-['Inter'] font-bold tracking-tight text-lg text-[#003857] dark:text-[#71c0fe]">EN | ES</span>
</div>
</header>
<!-- Modal Backdrop -->
<main class="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-primary/20 backdrop-blur-sm">
<!-- Report Modal Content -->
<section class="bg-surface-container-lowest w-full max-w-lg max-h-[795px] overflow-y-auto rounded-xl shadow-[0_8px_24px_rgba(0,56,87,0.06)] flex flex-col relative custom-scrollbar">
<!-- Modal Header -->
<div class="sticky top-0 bg-surface-container-lowest z-10 px-6 py-5 flex justify-between items-center border-b border-outline-variant/15">
<h1 class="font-headline font-bold text-xl tracking-tight text-primary">Submit Report / Enviar reporte</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<div class="p-6 space-y-8">
<!-- Category Picker Section -->
<div>
<h2 class="text-xs font-bold tracking-widest text-outline uppercase mb-4">Select Category</h2>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
<!-- Category Chip: Flooding -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-secondary-container/20 hover:border-secondary transition-all group">
<span class="material-symbols-outlined text-3xl mb-2 text-primary group-hover:scale-110 transition-transform">water_damage</span>
<span class="text-[10px] font-bold text-primary text-center">Flooding</span>
</button>
<!-- Category Chip: Road Closure -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-secondary-container/20 hover:border-secondary transition-all group">
<span class="material-symbols-outlined text-3xl mb-2 text-primary group-hover:scale-110 transition-transform">block</span>
<span class="text-[10px] font-bold text-primary text-center">Road Closure</span>
</button>
<!-- Category Chip: Power Outage -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-secondary-container/20 hover:border-secondary transition-all group">
<span class="material-symbols-outlined text-3xl mb-2 text-primary group-hover:scale-110 transition-transform">bolt</span>
<span class="text-[10px] font-bold text-primary text-center">Power Outage</span>
</button>
<!-- Category Chip: Wildfire -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-error-container/20 hover:border-error transition-all group">
<span class="material-symbols-outlined text-3xl mb-2 text-error group-hover:scale-110 transition-transform" data-icon="local_fire_department">local_fire_department</span>
<span class="text-[10px] font-bold text-primary text-center">Wildfire</span>
</button>
<!-- Category Chip: Tree -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-secondary-container/20 hover:border-secondary transition-all group">
<span class="material-symbols-outlined text-3xl mb-2 text-primary group-hover:scale-110 transition-transform">park</span>
<span class="text-[10px] font-bold text-primary text-center">Tree</span>
</button>
<!-- Category Chip: Earthquake -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-tertiary-container/20 hover:border-tertiary transition-all group">
<span class="material-symbols-outlined text-3xl mb-2 text-tertiary group-hover:scale-110 transition-transform">waves</span>
<span class="text-[10px] font-bold text-primary text-center">Earthquake</span>
</button>
<!-- Category Chip: Tsunami -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-secondary-container/20 hover:border-secondary transition-all group">
<span class="material-symbols-outlined text-3xl mb-2 text-primary group-hover:scale-110 transition-transform">tsunami</span>
<span class="text-[10px] font-bold text-primary text-center">Tsunami</span>
</button>
<!-- Category Chip: Mudslide -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-secondary-container/20 hover:border-secondary transition-all group">
<span class="material-symbols-outlined text-3xl mb-2 text-primary group-hover:scale-110 transition-transform">landslide</span>
<span class="text-[10px] font-bold text-primary text-center">Mudslide</span>
</button>
</div>
</div>
<!-- Text Input Section -->
<div>
<div class="flex justify-between items-end mb-2">
<label class="text-xs font-bold tracking-widest text-outline uppercase">Description / Descripción</label>
<span class="text-[10px] font-medium text-outline-variant">0/280</span>
</div>
<textarea class="w-full min-h-[120px] bg-surface-container-low border-0 rounded-xl p-4 text-on-surface focus:ring-2 focus:ring-secondary placeholder:text-outline-variant resize-none" placeholder="Describe what you see / Describa lo que ve"></textarea>
</div>
<!-- Media and Map Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Photo Upload -->
<div>
<h2 class="text-xs font-bold tracking-widest text-outline uppercase mb-2">Evidence</h2>
<button class="w-full h-32 flex flex-col items-center justify-center rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low hover:bg-surface-container-high hover:border-secondary transition-all group">
<span class="material-symbols-outlined text-3xl text-outline-variant group-hover:text-secondary mb-2">photo_camera</span>
<span class="text-xs font-semibold text-on-surface-variant group-hover:text-secondary">Add Photo / Añadir foto</span>
</button>
</div>
<!-- Mini Map -->
<div>
<h2 class="text-xs font-bold tracking-widest text-outline uppercase mb-2">Location</h2>
<div class="relative w-full h-32 rounded-xl overflow-hidden bg-surface-container-high border border-outline-variant/15">
<img alt="Map snippet showing local streets" class="w-full h-full object-cover" data-alt="Top-down map view of urban city streets with a red marker pinpointing a specific intersection" data-location="San Francisco, California" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDANabpwAdrrWYuuuHnIruqHZX4CeFcSi8ouOAPDEjmFjh9hELnJOAOeE1-vX8oVtmnUKUGJZfZJNBgdMIPv4wEoBxEfWdRv9Y6nwJ2rOvHu5L9Y-3G0t3B-oGaiALZBkwWxaiSVYlhm8D-lmq40QUPj9lMqfTktWjnHwUh1xOy0EKCVjBZShyniiUyLqEjkmSfL-dgLXpMITN_LXqJEOhJppAHY6shvZVXksoYw-0VlLqKTfCsrO_d6f2yZuAgqz7Vm3-N1gvyHw"/>
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<span class="material-symbols-outlined text-error text-3xl drop-shadow-md" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="absolute bottom-2 left-2 right-2 bg-surface/90 backdrop-blur-sm px-2 py-1 rounded text-[10px] font-bold text-primary truncate">
                                GPS: 34.0522° N, 118.2437° W
                            </div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4 pb-2">
<button class="w-full bg-primary-container hover:bg-primary text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 shadow-lg transition-all active:scale-95 group">
<span class="material-symbols-outlined text-white" data-weight="fill" style="font-variation-settings: 'FILL' 1;">send</span>
<span>Submit Report / Enviar reporte</span>
</button>
<p class="text-[10px] text-center text-outline-variant mt-4 font-medium uppercase tracking-tighter">All reports are sent to the emergency operations center immediately</p>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation (From JSON) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/70 dark:bg-[#1A1A2E]/70 backdrop-blur-md shadow-[0_-8px_24px_rgba(0,56,87,0.06)] rounded-t-3xl">
<div class="flex flex-col items-center justify-center text-[#44474e] dark:text-[#c4c6cf] px-5 py-2 hover:bg-[#f2f4f5] dark:hover:bg-[#1B4F72] rounded-2xl transition-colors">
<span class="material-symbols-outlined mb-1">explore</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase">Zones</span>
</div>
<!-- ACTIVE TAB: Reports -->
<div class="flex flex-col items-center justify-center bg-[#71c0fe]/20 text-[#003857] dark:text-[#71c0fe] rounded-2xl px-5 py-2 scale-90 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">list_alt</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase">Reports</span>
</div>
<div class="flex flex-col items-center justify-center text-[#44474e] dark:text-[#c4c6cf] px-5 py-2 hover:bg-[#f2f4f5] dark:hover:bg-[#1B4F72] rounded-2xl transition-colors">
<span class="material-symbols-outlined mb-1">map</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase">Map</span>
</div>
<div class="flex flex-col items-center justify-center text-[#44474e] dark:text-[#c4c6cf] px-5 py-2 hover:bg-[#f2f4f5] dark:hover:bg-[#1B4F72] rounded-2xl transition-colors">
<span class="material-symbols-outlined mb-1">assignment</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase">Checklist</span>
</div>
</nav>
</body></html>
